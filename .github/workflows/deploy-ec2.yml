name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ~/wiki-agent
            git pull --ff-only
            bash scripts/deploy_ec2.sh
